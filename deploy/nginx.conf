upstream landintel_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # FMB PDFs are typically 1-5 MB; allow up to 20 MB for batch uploads.
    client_max_body_size 20M;

    # API -- proxied to uvicorn inside the container.
    location /api/ {
        proxy_pass         http://landintel_api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # M1 OCR + agent pipeline can take several minutes per job.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Frontend SPA (built by Vite, copied to /var/www/landintel at deploy time).
    location / {
        root  /var/www/landintel;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Health probe -- nginx itself responds so load balancers can check the host.
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
